services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    image: gh05tpl-messenger-prometheus-bundle-php:${PHP_VERSION:-8.3}
    working_dir: /app
    volumes:
      - .:/app
      - .docker-cache/composer:/tmp/composer/cache
    environment:
      COMPOSER_HOME: /tmp/composer
    stdin_open: true
    tty: true
